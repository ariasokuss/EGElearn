<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NovaLearn Inspector — Lesson</title>
    <link rel="stylesheet" href="/api/v1/inspector/assets/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
    <script src="/api/v1/inspector/assets/app.js" defer></script>
    <style>
      /* ── Force single-column layout for this page ── */
      .page-grid { grid-template-columns: 1fr; }

      /* ── Lesson markdown ── */
      .lesson-content { line-height: 1.7; }
      .lesson-content p { margin: 0 0 0.9rem; color: var(--ink); }
      .lesson-content h2, .lesson-content h3 { font-family: "Iowan Old Style","Palatino Linotype",Georgia,serif; letter-spacing: -0.02em; margin: 1.4rem 0 0.5rem; }
      .lesson-content blockquote { border-left: 3px solid var(--accent); margin: 0.7rem 0; padding: 0.4rem 1rem; color: var(--muted); }
      .lesson-content table { border-collapse: collapse; width: 100%; margin: 0.8rem 0; font-size: 0.93rem; }
      .lesson-content th, .lesson-content td { border: 1px solid var(--line-strong); padding: 0.5rem 0.7rem; text-align: left; }
      .lesson-content th { background: rgba(103,212,193,0.07); color: var(--teal); }
      .lesson-content ul, .lesson-content ol { padding-left: 1.4rem; margin: 0 0 0.8rem; }
      .lesson-content li { margin-bottom: 0.3rem; }
      .lesson-content hr { border: none; border-top: 1px solid var(--line); margin: 1.4rem 0; }
      .lesson-content code { font-family: "SFMono-Regular",Consolas,monospace; font-size: 0.88em; background: rgba(103,212,193,0.09); padding: 0.1em 0.35em; border-radius: 4px; }

      /* ── Custom directive blocks ── */
      .block-definition { border-left: 3px solid var(--accent); background: rgba(103,212,193,0.06); border-radius: 0 12px 12px 0; padding: 0.9rem 1rem; margin: 0.8rem 0; }
      .block-definition .block-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.4rem; }
      .block-question { border-left: 3px solid #93b3ff; background: rgba(86,136,255,0.07); border-radius: 0 12px 12px 0; padding: 0.9rem 1rem; margin: 0.8rem 0; }
      .block-question .block-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.15em; color: #93b3ff; margin-bottom: 0.4rem; }
      .block-application { border-left: 3px solid #f5c842; background: rgba(245,200,66,0.06); border-radius: 0 12px 12px 0; padding: 0.9rem 1rem; margin: 0.8rem 0; }
      .block-application .block-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.15em; color: #f5c842; margin-bottom: 0.4rem; }

      /* ── Feynman inline widget ── */
      .block-feynman { border: 1px solid rgba(103,212,193,0.3); background: rgba(103,212,193,0.04); border-radius: 16px; padding: 1.1rem 1.2rem; margin: 1rem 0; }
      .block-feynman .block-label { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.15em; color: var(--accent); margin-bottom: 0.5rem; }
      .feynman-question { font-style: italic; color: var(--ink); margin: 0.3rem 0 0.7rem; line-height: 1.65; }
      .feynman-points { margin: 0 0 0.8rem; padding-left: 1.2rem; }
      .feynman-points li { color: var(--muted); font-size: 0.93rem; margin-bottom: 0.2rem; }
      .feynman-actions { display: flex; gap: 0.7rem; align-items: center; flex-wrap: wrap; }

      /* Progress track */
      .fw-progress-row { display: flex; align-items: center; gap: 0.7rem; margin: 0.6rem 0 0.8rem; }
      .fw-iter-track { display: flex; gap: 0.35rem; }
      .fw-iter-dot { width: 32px; height: 5px; border-radius: 999px; background: var(--line-strong); transition: background 0.25s; }
      .fw-iter-dot.fw-active { background: var(--teal); }
      .fw-iter-dot.fw-done { background: var(--accent); }
      .fw-iter-label { font-size: 0.79rem; color: var(--muted); }

      /* Points track in chat */
      .fw-points-track { display: flex; flex-direction: column; gap: 0.4rem; padding: 0.6rem 0; border-top: 1px solid var(--line); }
      .fw-point-item { display: flex; align-items: flex-start; gap: 0.45rem; font-size: 0.88rem; color: var(--muted); line-height: 1.45; transition: color 0.2s; }
      .fw-point-icon { flex-shrink: 0; width: 1.1em; text-align: center; }
      .fw-point-item.fw-covered { color: var(--teal); }
      .fw-point-item.fw-missed { color: var(--danger); }

      /* Message area */
      .fw-messages { display: flex; flex-direction: column; gap: 0.75rem; max-height: 380px; overflow-y: auto; padding: 0.75rem 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); margin: 0.5rem 0; }
      .fw-msg { display: flex; flex-direction: column; gap: 0.18rem; max-width: 86%; }
      .fw-msg--assistant { align-self: flex-start; }
      .fw-msg--user { align-self: flex-end; }
      .fw-msg-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }
      .fw-msg-bubble { padding: 0.72rem 0.95rem; border-radius: 14px; line-height: 1.65; font-size: 0.96rem; white-space: pre-wrap; }
      .fw-msg--assistant .fw-msg-bubble { background: rgba(103,212,193,0.07); border: 1px solid rgba(103,212,193,0.18); border-bottom-left-radius: 4px; }
      .fw-msg--user .fw-msg-bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--line-strong); border-bottom-right-radius: 4px; }

      /* Thinking dots */
      .fw-thinking { display: flex; gap: 4px; align-items: center; }
      .fw-thinking span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: fwBounce 1.2s infinite; }
      .fw-thinking span:nth-child(2) { animation-delay: 0.2s; }
      .fw-thinking span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes fwBounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-5px); } }

      /* Input bar */
      .fw-input-bar { display: flex; gap: 0.6rem; align-items: flex-end; margin-top: 0.5rem; }
      .fw-textarea { flex: 1; background: rgba(8,12,18,0.86); border: 1px solid var(--line); border-radius: 12px; color: var(--ink); font: inherit; font-size: 0.95rem; padding: 0.72rem 0.9rem; resize: none; min-height: 50px; max-height: 150px; transition: border-color 0.15s; }
      .fw-textarea:focus { outline: none; border-color: rgba(103,212,193,0.36); }
      .fw-textarea:disabled { opacity: 0.4; cursor: not-allowed; }

      /* Summary */
      .fw-summary { margin-top: 0.6rem; }
      .fw-summary-card { background: rgba(103,212,193,0.06); border: 1px solid rgba(103,212,193,0.22); border-radius: 14px; padding: 1rem 1.1rem; }
      .fw-summary-title { font-family: "Iowan Old Style","Palatino Linotype",Georgia,serif; font-size: 1rem; color: var(--teal); margin: 0 0 0.4rem; }
      .fw-summary-text { font-size: 0.93rem; line-height: 1.6; color: var(--muted); margin: 0 0 0.65rem; }
      .fw-points-result { display: flex; flex-direction: column; gap: 0.3rem; }
      .fw-pr-item { display: flex; gap: 0.45rem; font-size: 0.88rem; color: var(--muted); }
      .fw-pr-item.fw-covered { color: var(--teal); }
      .fw-pr-item.fw-missed { color: var(--danger); }

      /* Lesson block separators */
      .block-number-pill { font-size: 0.75rem; color: var(--muted); background: rgba(255,255,255,0.04); border: 1px solid var(--line); border-radius: 999px; padding: 0.2rem 0.5rem; margin-right: 0.3rem; }
      .lesson-block + .lesson-block { border-top: 1px solid var(--line); padding-top: 1.1rem; }
    </style>
  </head>
  <body data-page="lesson">
    <div class="page-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow"><a id="lessonsBackLink" href="../lessons">← Lessons</a></p>
          <h1 id="lessonTitle">Lesson</h1>
        </div>
        <div class="topbar-actions">
          <div class="session-chip" id="sessionLabel">User</div>
          <button id="signOutButton" type="button" class="button ghost">Sign out</button>
        </div>
      </header>

      <div id="flash" class="flash" hidden></div>

      <main class="page-grid">
        <section class="panel">
          <div id="lessonMeta" class="pill-row"></div>
        </section>

        <section class="panel stack">
          <div class="section-heading">
            <p class="eyebrow">Content</p>
            <h2>Lesson blocks</h2>
          </div>
          <div id="lessonBlocksList" class="stack"></div>
        </section>
      </main>
    </div>
  </body>
</html>
