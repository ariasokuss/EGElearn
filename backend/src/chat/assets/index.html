            /* ══════════════════════════════════════════════════
   Settings
══════════════════════════════════════════════════ */
            function openSettings() {
                document.getElementById("cfgBase").value = cfg.base;
                document.getElementById("cfgUser").value = cfg.userId;
                document.getElementById("cfgFolder").value = cfg.folder;
                document.getElementById("overlay").classList.remove("hidden");
                document.getElementById("cfgUser").focus();

                if (docList.length) {
                    _populateDocSelect();
                } else if (cfg.folder && cfg.userId) {
                    loadDocuments();
                }
            }
            function closeSettings() {
                document.getElementById("overlay").classList.add("hidden");
            }

            async function testStream() {
                const base =
                    document
                        .getElementById("cfgBase")
                        .value.trim()
                        .replace(/\/$/, "") || cfg.base;
                streamEl = startStreamingMsg();
                streamText = "";
                streaming = true;
                syncSendBtn();
                try {
                    const res = await fetch(`${base}/chat/stream-test`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    await consumeSSE(res, streamEl);
                } catch (err) {
                    finalizeStream(streamEl, `**Error:** ${err.message}`, []);
                } finally {
                    streaming = false;
                    hideStatus();
                    syncSendBtn();
                }
            }

            async function loadDocuments() {
                const folder =
                    document.getElementById("cfgFolder").value.trim() ||
                    cfg.folder;
                const userId =
                    document.getElementById("cfgUser").value.trim() ||
                    cfg.userId;
                const btn = document.getElementById("btnLoadDocs");
                const hint = document.getElementById("docLoadHint");

                if (!folder || !userId) {
                    hint.textContent = "⚠ Fill in User ID and Folder ID first";
                    return;
                }

                btn.textContent = "…";
                btn.disabled = true;
                hint.textContent = "Loading…";

                try {
                    const base =
                        document
                            .getElementById("cfgBase")
                            .value.trim()
                            .replace(/\/$/, "") || cfg.base;
                    const r = await fetch(
                        `${base}/chat/documents?folder_id=${enc(folder)}`,
                        { headers: authHeaders() },
                    );
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const d = await r.json();
                    docList = d.documents || [];

                    if (!docList.length) {
                        hint.textContent = "No documents found in this folder";
                    } else {
                        hint.textContent = `${docList.length} document${docList.length !== 1 ? "s" : ""} loaded`;
                    }
                    _populateDocSelect();
                    if (vSt.open) vPopulateLink();
                } catch (e) {
                    hint.textContent = `Error: ${e.message}`;
                    docList = [];
                } finally {
                    btn.textContent = "↻";
                    btn.disabled = false;
                }
            }

            function _populateDocSelect() {
                const sel = document.getElementById("cfgDocSelect");
                sel.innerHTML =
                    '<option value="">— No document context —</option>';
                for (const doc of docList) {
                    const opt = document.createElement("option");
                    opt.value = doc.id;
                    opt.textContent = `${doc.name}  (${doc.page_count}p)`;
                    sel.appendChild(opt);
                }
                if (cfg.doc) sel.value = cfg.doc;
                _onDocSelectChange();
                sel.onchange = _onDocSelectChange;
            }

            function _onDocSelectChange() {
                const sel = document.getElementById("cfgDocSelect");
                const doc = docList.find((d) => d.id === sel.value);
                const sec = document.getElementById("pageSection");
                const info = document.getElementById("pageInfo");
                const sl = document.getElementById("cfgPageSlider");

                if (doc) {
                    sec.style.display = "";
                    sl.max = doc.page_count;
                    sl.value = cfg.doc === doc.id && cfg.page ? cfg.page : 1;
                    syncPageLabel();
                } else {
                    sec.style.display = "none";
                    info.textContent = "";
                }
            }

            function syncPageLabel() {
                const sl = document.getElementById("cfgPageSlider");
                const doc = docList.find(
                    (d) =>
                        d.id === document.getElementById("cfgDocSelect").value,
                );
                document.getElementById("pageInfo").textContent = doc
                    ? `${sl.value} / ${doc.page_count}`
                    : "";
            }

            function applySettings() {
                const prev = { ...cfg };

                const sel = document.getElementById("cfgDocSelect");
                const selDoc = docList.find((d) => d.id === sel.value) || null;
                const slider = document.getElementById("cfgPageSlider");

                saveCfg({
                    base: document
                        .getElementById("cfgBase")
                        .value.trim()
                        .replace(/\/$/, ""),
                    userId: document.getElementById("cfgUser").value.trim(),
                    folder: document.getElementById("cfgFolder").value.trim(),
                    doc: selDoc ? selDoc.id : "",
                    docName: selDoc ? selDoc.name : "",
                    page: selDoc ? String(slider.value) : "",
                    total: selDoc ? String(selDoc.page_count) : "",
                });

                closeSettings();
                updateDocPill();
                updateFooter();
                syncSendBtn();

                activeId = null;
                clearMessages();
                fetchConversations();
                toast("Settings saved", "ok");
            }

            function updateDocPill() {
                const pill = document.getElementById("docPill");
                const text = document.getElementById("docPillText");
                if (cfg.doc && cfg.page && cfg.total) {
                    const name = cfg.docName || cfg.doc.slice(0, 8) + "…";
                    text.textContent = `${name}  ·  p. ${cfg.page} / ${cfg.total}`;
                    pill.style.display = "flex";
                } else {
                    pill.style.display = "none";
                }
            }
            function updateFooter() {
                const el = document.getElementById("railAvatar");
                el.textContent = cfg.userId ? cfg.userId[0].toUpperCase() : "U";
            }
            function syncSendBtn() {
                const btn = document.getElementById("btnSend");
                const val = document.getElementById("msgInput").value.trim();
                btn.disabled = !val || !cfg.userId || !cfg.folder || streaming;
            }

            /* ══════════════════════════════════════════════════
   Last AI message chip
══════════════════════════════════════════════════ */
            function updateLastMsgChip(text) {
                const chip = document.getElementById("lastMsgChip");
                const textEl = document.getElementById("lastMsgText");
                if (!text) {
                    chip.style.display = "none";
                    return;
                }
                // Strip citation markers and markdown to plain text
                const plain = text
                    .replace(/:::link Doc:"[^"]+",\s*pages?:"[^"]+":::/g, "")
                    .replace(/#{1,6}\s/g, "")
                    .replace(/[*_`~\[\]]/g, "")
                    .replace(/\s+/g, " ")
                    .trim();
                if (!plain) {
                    chip.style.display = "none";
                    return;
                }
                textEl.textContent = plain;
                chip.style.display = "flex";
            }

            /* ══════════════════════════════════════════════════
   Conversations
══════════════════════════════════════════════════ */
            async function fetchConversations() {
                if (!cfg.userId && !LS("accessToken")) return;
                try {
                    const url = cfg.folder
                        ? `${cfg.base}/chat/conversations?folder_id=${enc(cfg.folder)}`
                        : `${cfg.base}/chat/conversations`;
                    const r = await fetch(url, { headers: authHeaders() });
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const d = await r.json();
                    conversations = d.conversations || [];
                    renderConvList();
                } catch (e) {
                    console.error("fetchConversations", e);
                }
            }

            function renderConvList() {
                const list = document.getElementById("convList");
                if (!conversations.length) {
                    list.innerHTML =
                        '<div class="conv-empty">No conversations yet</div>';
                    return;
                }
                list.innerHTML = conversations
                    .map((c) => {
                        const active = c.id === activeId ? "active" : "";
                        const title = esc(c.title || "New Conversation");
                        const preview = esc(c.last_message_preview || "");
                        const time = relTime(c.updated_at);
                        return `
      <div class="conv-item ${active}" data-id="${c.id}" onclick="selectConv('${c.id}')">
        <div class="conv-info">
          <div class="conv-title">${title}</div>
          <div class="conv-meta">${preview || time}</div>
        </div>
        <button class="conv-del" title="Delete" onclick="deleteConv(event,'${c.id}')">✕</button>
      </div>`;
                    })
                    .join("");
            }

            async function selectConv(id) {
                if (id === activeId) return;
                activeId = id;
                renderConvList();
                await loadMessages(id);
            }

            async function loadMessages(id) {
                clearMessages();
                try {
                    const r = await fetch(
                        `${cfg.base}/chat/conversations/${id}/messages`,
                        { headers: authHeaders() },
                    );
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const d = await r.json();
                    const msgs = d.messages || [];

                    const conv = conversations.find((c) => c.id === id);
                    setTitle(conv?.title || null);

                    hideEmpty();
                    if (!msgs.length) {
                        showEmpty();
                        return;
                    }

                    let lastAi = "";
                    for (const m of msgs) {
                        if (m.role === "user") {
                            appendUser(m.content);
                        } else if (m.role === "assistant") {
                            const cits = m.metadata?.citations || [];
                            appendAssistant(m.content, cits, false);
                            lastAi = m.content;
                        }
                    }
                    if (lastAi) updateLastMsgChip(lastAi);
                    scrollBottom();
                } catch (e) {
                    toast(`Failed to load messages: ${e.message}`, "err");
                }
            }

            async function deleteConv(e, id) {
                e.stopPropagation();
                try {
                    const r = await fetch(
                        `${cfg.base}/chat/conversations/${id}`,
                        {
                            method: "DELETE",
                            headers: authHeaders(),
                        },
                    );
                    if (!r.ok && r.status !== 204)
                        throw new Error(`HTTP ${r.status}`);
                    conversations = conversations.filter((c) => c.id !== id);
                    if (activeId === id) {
                        activeId = null;
                        clearMessages();
                        setTitle(null);
                        showEmpty();
                    }
                    renderConvList();
                    toast("Conversation deleted");
                } catch (e) {
                    toast(`Delete failed: ${e.message}`, "err");
                }
            }

            function newConversation() {
                activeId = null;
                clearMessages();
                showEmpty();
                setTitle(null);
                renderConvList();
                updateLastMsgChip("");
                document.getElementById("msgInput").focus();
            }

            /* ══════════════════════════════════════════════════
   Messages
══════════════════════════════════════════════════ */
            function clearMessages() {
                document.getElementById("messages").innerHTML =
                    '<div class="empty-state" id="emptyState" style="display:none"></div>';
                updateLastMsgChip("");
            }
            function showEmpty() {
                const el = document.getElementById("emptyState");
                if (el) {
                    el.innerHTML = `

            /* ══════════════════════════════════════════════════
   Markdown & Citations
══════════════════════════════════════════════════ */
            const CIT_RE = /:::link Doc:"([^"]+)", page(?:s|):"([^"]+)":::/g;

            function _katexRender(math, display) {
                try {
                    return katex.renderToString(math, {
                        displayMode: display,
                        throwOnError: true,
                        strict: false,
                    });
                } catch (e) {
                    const raw = esc(display ? `$$${math}$$` : `$${math}$`);
                    return `<span class="math-err" title="${esc(String(e))}">${raw}</span>`;
                }
            }

            function _extractMath(text) {
                const slots = [];
                const ph = (display, math) => {
                    slots.push({ display, math });
                    return `\x02MATH${slots.length - 1}\x03`;
                };
                text = text.replace(/\$\$([\s\S]*?)\$\$/g, (_, m) =>
                    ph(true, m),
                );
                text = text.replace(/\\\[([\s\S]*?)\\\]/g, (_, m) =>
                    ph(true, m),
                );
                text = text.replace(/\$([^\$\n]+?)\$/g, (_, m) => ph(false, m));
                text = text.replace(/\\\(([^\n]+?)\\\)/g, (_, m) =>
                    ph(false, m),
                );
                return { text, slots };
            }

            function _restoreMath(html, slots) {
                return html.replace(/\x02MATH(\d+)\x03/g, (_, i) => {
                    const { display, math } = slots[+i];
                    const rendered = _katexRender(math, display);
                    return display
                        ? `<div class="math-block">${rendered}</div>`
                        : `<span class="math-inline">${rendered}</span>`;
                });
            }

            function renderMd(text) {
                const cits = [];
                text = text.replace(CIT_RE, (_, docName, pages) => {
                    const i = cits.findIndex(
                        (c) => c.docName === docName && c.pages === pages,
                    );
                    if (i !== -1) return `\x02CIT${i}\x03`;
                    cits.push({ docName, pages });
                    return `\x02CIT${cits.length - 1}\x03`;
                });

                const { text: safe, slots } = _extractMath(text);
                let html = marked.parse(safe, { breaks: true, gfm: true });
                html = _restoreMath(html, slots);

                html = html.replace(/\x02CIT(\d+)\x03/g, (_, i) => {
                    const c = cits[+i];
                    const doc = c ? esc(c.docName) : "";
                    const pg = c ? esc(c.pages) : "";
                    return `<sup class="cit-ref" data-doc="${doc}" data-pg="${pg}">[${+i + 1}]</sup>`;
                });

                return { html, cits };
            }

            function buildCitations(citations) {
                if (!citations || !citations.length) return "";
                const chips = citations
                    .map((c) => {
                        const pages = c.pages || [];
                        let pg = "";
                        if (pages.length === 1) pg = `p.${pages[0]}`;
                        else if (pages.length > 1)
                            pg = `pp.${Math.min(...pages)}–${Math.max(...pages)}`;
                        const name = esc(
                            c.document_name || c.document_id || "",
                        );
                        return `
      <span class="cit-chip" title="${name}">
        <span>📄</span>
        <span class="cit-doc">${name}</span>
        ${pg ? `<span class="cit-pg">${pg}</span>` : ""}
      </span>`;
                    })
                    .join("");
                return `<div class="citations"><span class="cit-label">Sources</span>${chips}</div>`;
            }

            /* ══════════════════════════════════════════════════
   Send / SSE
══════════════════════════════════════════════════ */
            async function doSend() {
                const input = document.getElementById("msgInput");
                const text = input.value.trim();
                if (!text || streaming) return;

                input.value = "";
                autoResize(input);
                syncSendBtn();
                appendUser(text);

                streamEl = startStreamingMsg();
                streamText = "";
                streaming = true;
                syncSendBtn();

                const payload = {
                    conversation_id: activeId,
                    folder_id: cfg.folder,
                    message: text,
                    model:
                        document.getElementById("modelSelect").value || "YandexGPT",
                    reasoning:
                        document.getElementById("reasoningSelect").value ||
                        "",
                };
                if (cfg.doc && cfg.page && cfg.total) {
                    payload.current_document_id = cfg.doc;
                    payload.current_page = parseInt(cfg.page);
                    payload.total_pages = parseInt(cfg.total);
                }

                try {
                    const res = await fetch(`${cfg.base}/chat/message`, {
                        method: "POST",
                        headers: authHeaders({
                            "Content-Type": "application/json",
                        }),
                        body: JSON.stringify(payload),
                    });

                    if (!res.ok) {
                        let detail = `HTTP ${res.status}`;
                        try {
                            detail = (await res.json()).detail || detail;
                        } catch {}
                        throw new Error(detail);
                    }

                    await consumeSSE(res, streamEl);
                } catch (err) {
                    finalizeStream(streamEl, `**Error:** ${err.message}`, []);
                    toast(err.message, "err");
                } finally {
                    streaming = false;
                    hideStatus();
                    syncSendBtn();
                }
            }

            async function consumeSSE(res, el) {
                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let buf = "";

                try {
                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;
                        buf += decoder.decode(value, { stream: true });

                        let boundary;
                        while ((boundary = buf.indexOf("\n\n")) !== -1) {
                            const raw = buf.slice(0, boundary);
                            buf = buf.slice(boundary + 2);
                            if (!raw.trim()) continue;

                            let type = "",
                                data = null;
                            for (const line of raw.split("\n")) {
                                if (line.startsWith("event: "))
                                    type = line.slice(7).trim();
                                else if (line.startsWith("data: ")) {
                                    try {
                                        data = JSON.parse(line.slice(6));
                                    } catch {
                                        data = { _raw: line.slice(6) };
                                    }
                                }
                            }
                            if (!type || data === null) continue;

                            switch (type) {
                                case "token":
                                    if (!streamEl) {
                                        streamEl = startStreamingMsg();
                                    }
                                    streamText += data.content || "";
                                    requestAnimationFrame(() =>
                                        updateStream(streamEl, streamText),
                                    );
                                    break;

                                case "status":
                                    updateStatus(data);
                                    try {
                                        // Log a compact, human-readable status line
                                        const step = data.step || "";
                                        const it = data.iteration;
                                        const maxIt = data.max_iterations;
                                        let line = step || "status";
                                        if (it && maxIt)
                                            line += ` (${it}/${maxIt})`;
                                        else if (it) line += ` (iter ${it})`;
                                        if (step === "searching" && data.query) {
                                            line += ` · q="${data.query}"`;
                                        } else if (
                                            step === "reading_pages" &&
                                            data.document_name
                                        ) {
                                            const p = data.pages || [];
                                            line += ` · ${data.document_name} [${p[0]}–${p[1]}]`;
                                        } else if (
                                            step === "tool_error" &&
                                            data.tool
                                        ) {
                                            line += ` · ${data.tool}: ${data.message || ""}`;
                                        }
                                        appendDebugLog(line);
                                    } catch {}
                                    break;

                                case "message_complete": {
                                    const content = data.content || streamText;
                                    const citations = data.citations || [];
                                    finalizeStream(el, content, citations);
                                    if (data.conversation_id)
                                        activeId = data.conversation_id;
                                    await fetchConversations();
                                    highlightActive();
                                    const conv = conversations.find(
                                        (c) => c.id === activeId,
                                    );
                                    if (conv?.title) setTitle(conv.title);
                                    break;
                                }

                                case "followup_suggestions":
                                    addFollowups(el, data.questions || []);
                                    break;

                                case "error":
                                    finalizeStream(
                                        el,
                                        `**Error:** ${data.message || "Something went wrong"}`,
                                        [],
                                    );
                                    toast(data.message, "err");
                                    appendDebugLog(
                                        `ERROR: ${data.message || "Something went wrong"}`,
                                    );
                                    break;
                            }
                        }
                    }
                } finally {
                    if (streamText && el.querySelector(".cursor")) {
                        finalizeStream(el, streamText, []);
                    }
                }
            }

            /* ══════════════════════════════════════════════════
   Status Bar
══════════════════════════════════════════════════ */
            function updateStatus(data) {
                const bar = document.getElementById("statusBar");
                const text = document.getElementById("statusText");
                const iter = document.getElementById("statusIter");

                bar.classList.add("on");

                const step = data.step || "";
                const it = data.iteration,
                    maxIt = data.max_iterations;
                if (it && maxIt) {
                    iter.textContent = `${it} / ${maxIt}`;
                    iter.style.display = "";
                } else if (it) {
                    iter.textContent = `iter ${it}`;
                    iter.style.display = "";
                } else {
                    iter.style.display = "none";
                }

                if (step === "thinking") {
                    const n = data.chunks_in_context || 0;
                    text.textContent = n
                        ? `Thinking… (${n} chunk${n !== 1 ? "s" : ""})`
                        : "Thinking…";
                } else if (step === "searching") {
                    const q = data.query || "";
                    const docs = data.filtered_documents;
                    let msg = `Searching: "${q}"`;
                    if (docs?.length) msg += `  ·  ${docs.join(", ")}`;
                    text.textContent = msg;
                } else if (step === "reading_pages") {
                    const doc = data.document_name || data.document_id || "?";
                    const pgs = data.pages || [];
                    text.textContent = `Reading pages ${pgs[0]}–${pgs[1]} of "${doc}"`;
                } else if (step === "evaluating") {
                    const n = data.chunks_retrieved || 0;
                    text.textContent = `Evaluating… (${n} chunks retrieved)`;
                } else if (step === "asking_clarification") {
                    text.textContent = "Asking for clarification…";
                } else if (step === "analyzing_followups") {
                    text.textContent = "Generating follow-ups…";
                } else if (step === "tool_error") {
                    text.textContent = `Tool error: ${data.message || ""}`;
                } else {
                    text.textContent = step || "Working…";
                }
            }
            function hideStatus() {
                document.getElementById("statusBar").classList.remove("on");
                document.getElementById("statusIter").style.display = "none";
            }

            /* ══════════════════════════════════════════════════
   PDF Viewer
══════════════════════════════════════════════════ */
            if (typeof pdfjsLib !== "undefined") {
                pdfjsLib.GlobalWorkerOptions.workerSrc =
                    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
            }

            // Restore saved viewer width
            (function () {
                const saved =
                    parseInt(localStorage.getItem("nc_viewerW")) || 520;
                document.documentElement.style.setProperty(
                    "--vw",
                    saved + "px",
                );
            })();

            const vSt = {
                open: false,
                pdf: null,
                page: 1,
                total: 0,
                linkedDocId: "",
                rendering: false,
                scale: 1.0,
                baseScale: 1.0,
            };

            /* ── Drag-to-resize handle ─── */
            (function () {
                const VW_MIN = 280;
                const CHAT_MIN = 360;

                function getLeftOffset() {
                    const railW =
                        parseInt(
                            getComputedStyle(
                                document.documentElement,
                            ).getPropertyValue("--rail-w"),
                        ) || 56;
                    const cp = document.getElementById("convPanel");
                    const convW =
                        cp && cp.classList.contains("open")
                            ? parseInt(
                                  getComputedStyle(
                                      document.documentElement,
                                  ).getPropertyValue("--conv-w"),
                              ) || 224
                            : 0;
                    return railW + convW;
                }

                document.addEventListener("DOMContentLoaded", () => {
                    const handle = document.getElementById("vResizeHandle");
                    if (!handle) return;

                    handle.addEventListener("mousedown", (e) => {
                        e.preventDefault();
                        const panel = document.getElementById("viewerPanel");
                        handle.classList.add("dragging");
                        panel.classList.add("resizing");
                        document.body.style.cursor = "col-resize";
                        document.body.style.userSelect = "none";

                        function onMove(e) {
                            const sw = getLeftOffset();
                            const maxW = Math.max(
                                VW_MIN,
                                window.innerWidth - sw - CHAT_MIN,
                            );
                            const newW = Math.max(
                                VW_MIN,
                                Math.min(maxW, e.clientX - sw),
                            );
                            document.documentElement.style.setProperty(
                                "--vw",
                                newW + "px",
                            );
                            if (vSt.pdf) {
                                clearTimeout(vSt._resizeTimer);
                                vSt._resizeTimer = setTimeout(
                                    () => vRenderPage(vSt.page),
                                    180,
                                );
                            }
                        }

                        function onUp() {
                            handle.classList.remove("dragging");
                            panel.classList.remove("resizing");
                            document.body.style.cursor = "";
                            document.body.style.userSelect = "";
                            const w =
                                parseInt(
                                    getComputedStyle(
                                        document.documentElement,
                                    ).getPropertyValue("--vw"),
                                ) || 520;
                            localStorage.setItem("nc_viewerW", w);
                            document.removeEventListener("mousemove", onMove);
                            document.removeEventListener("mouseup", onUp);
                        }

                        document.addEventListener("mousemove", onMove);
                        document.addEventListener("mouseup", onUp);
                    });
                });
            })();

            /* ── Toggle viewer ─── */
            function toggleViewer() {
                vSt.open = !vSt.open;
                const panel = document.getElementById("viewerPanel");
                const btn = document.getElementById("btnViewer");
                document
                    .querySelector(".app")
                    .classList.toggle("viewer-open", vSt.open);
                panel.classList.toggle("open", vSt.open);
                btn.classList.toggle("active", vSt.open);
                if (vSt.open) {
                    if (docList.length) {
                        vPopulateLink();
                    } else if (cfg.userId && cfg.folder) {
                        loadDocuments();
                    }
                }
            }

            /* ── File input / drop ─── */
            function vOpenFile() {
                document.getElementById("vFileInput").click();
            }
            function vOnFileInput(e) {
                const file = e.target.files?.[0];
                if (file) vLoadFile(file);
                e.target.value = "";
            }

            function vOnDragOver(e) {
                e.preventDefault();
                e.stopPropagation();
                document
                    .getElementById("vDropOverlay")
                    .classList.add("drag-over");
            }
            function vOnDragLeave(e) {
                e.stopPropagation();
                const panel = document.getElementById("viewerPanel");
                if (!panel.contains(e.relatedTarget)) {
                    document
                        .getElementById("vDropOverlay")
                        .classList.remove("drag-over");
                }
            }
            function vOnDrop(e) {
                e.preventDefault();
                e.stopPropagation();
                document
                    .getElementById("vDropOverlay")
                    .classList.remove("drag-over");
                const file = e.dataTransfer?.files?.[0];
                if (!file) return;
                if (
                    file.type === "application/pdf" ||
                    file.name.toLowerCase().endsWith(".pdf")
                ) {
                    if (!vSt.open) toggleViewer();
                    vLoadFile(file);
                } else {
                    toast("Please drop a PDF file", "err");
                }
            }

            /* ── Load PDF ─── */
            async function vLoadFile(file) {
                const overlay = document.getElementById("vDropOverlay");
                const wrap = document.getElementById("vCanvasWrap");
                overlay.classList.remove("drag-over");
                overlay.textContent = "Loading…";
                overlay.classList.remove("hidden");
                wrap.style.display = "none";

                try {
                    const buf = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: buf })
                        .promise;

                    vSt.pdf = pdf;
                    vSt.total = pdf.numPages;
                    vSt.page = 1;
                    vSt.scale = 1.0;
                    vSt.baseScale = 1.0;

                    const fnEl = document.getElementById("vFilename");
                    fnEl.textContent = file.name;
                    fnEl.classList.add("loaded");
                    document.getElementById("vPageTotal").textContent =
                        `/ ${vSt.total}`;

                    overlay.classList.add("hidden");
                    wrap.style.display = "";

                    await vRenderPage(1);
                    vAutoLinkDoc(file.name);
                    vPopulateLink();
                } catch (err) {
                    overlay.innerHTML = `
      <div class="viewer-drop-icon">📄</div>
      <div class="viewer-drop-text">No file loaded</div>
      <button class="viewer-drop-btn" onclick="vOpenFile()">Open PDF…</button>`;
                    overlay.classList.remove("hidden");
                    toast(`PDF error: ${err.message}`, "err");
                    console.error("vLoadFile", err);
                }
            }

            /* ── Render page ─── */
            async function vRenderPage(n) {
                if (!vSt.pdf) return;
                if (vSt.rendering) {
                    vSt._pendingPage = n;
                    return;
                }
                n = Math.max(1, Math.min(n, vSt.total));
                vSt.rendering = true;
                vSt.page = n;

                document.getElementById("vPageInput").value = n;
                document.getElementById("vBtnPrev").disabled = n <= 1;
                document.getElementById("vBtnNext").disabled = n >= vSt.total;

                try {
                    const page = await vSt.pdf.getPage(n);
                    const body = document.getElementById("vBody");
                    const canvas = document.getElementById("vCanvas");
                    const ctx = canvas.getContext("2d");

                    const availW = body.clientWidth - 28;
                    const vp1 = page.getViewport({ scale: 1 });
                    vSt.baseScale = Math.max(availW / vp1.width, 0.3);
                    const finalScale = vSt.baseScale * vSt.scale;

                    const vp = page.getViewport({ scale: finalScale });
                    canvas.width = vp.width;
                    canvas.height = vp.height;

                    await page.render({ canvasContext: ctx, viewport: vp })
                        .promise;
                    document.getElementById("vZoomLabel").textContent =
                        `${Math.round(vSt.scale * 100)}%`;
                    if (vSt.linkedDocId) vSyncToCfg();
                } catch (err) {
                    console.error("vRenderPage", err);
                } finally {
                    vSt.rendering = false;
                    if (vSt._pendingPage !== undefined) {
                        const p = vSt._pendingPage;
                        delete vSt._pendingPage;
                        vRenderPage(p);
                    }
                }
            }

            /* ── Navigation ─── */
            function vPrevPage() {
                if (vSt.page > 1) vRenderPage(vSt.page - 1);
            }
            function vNextPage() {
                if (vSt.page < vSt.total) vRenderPage(vSt.page + 1);
            }
            function vGoToPage(n) {
                if (!vSt.pdf || isNaN(n)) return;
                vRenderPage(Math.max(1, Math.min(n, vSt.total)));
            }

            /* ── Zoom ─── */
            const ZOOM_STEPS = [
                0.5, 0.67, 0.75, 0.9, 1.0, 1.25, 1.5, 1.75, 2.0, 2.5, 3.0,
            ];
            function vZoomIn() {
                const next = ZOOM_STEPS.find((s) => s > vSt.scale + 0.01);
                if (next) {
                    vSt.scale = next;
                    vRenderPage(vSt.page);
                }
            }
            function vZoomOut() {
                const prev = [...ZOOM_STEPS]
                    .reverse()
                    .find((s) => s < vSt.scale - 0.01);
                if (prev) {
                    vSt.scale = prev;
                    vRenderPage(vSt.page);
                }
            }

            /* ── Doc linking ─── */
            function vPopulateLink() {
                const sel = document.getElementById("vLinkSelect");
                const cur = sel.value || vSt.linkedDocId;
                sel.innerHTML = '<option value="">— Not linked —</option>';
                for (const doc of docList) {
                    const opt = document.createElement("option");
                    opt.value = doc.id;
                    opt.textContent = `${doc.name}  (${doc.page_count}p)`;
                    sel.appendChild(opt);
                }
                sel.value = cur || "";
            }

            function vAutoLinkDoc(filename) {
                if (!docList.length) return;
                const base = filename.replace(/\.pdf$/i, "").toLowerCase();
                const match = docList.find((d) => {
                    const dn = d.name.replace(/\.pdf$/i, "").toLowerCase();
                    return (
                        dn === base ||
                        d.name.toLowerCase() === filename.toLowerCase()
                    );
                });
                if (match) {
                    vSetLinkedDoc(match.id, false);
                    toast(`Linked to "${match.name}"`, "ok");
                }
            }

            function vSetLinkedDoc(id, updateSelect = true) {
                vSt.linkedDocId = id;
                if (updateSelect)
                    document.getElementById("vLinkSelect").value = id;
                const badge = document.getElementById("vLinkedBadge");
                if (id) {
                    badge.style.display = "";
                    if (!updateSelect && vSt.pdf) {
                        vSyncToCfg();
                    } else if (updateSelect) {
                        _vFetchPdf(id);
                    }
                } else {
                    badge.style.display = "none";
                    saveCfg({ doc: "", docName: "", page: "", total: "" });
                    updateDocPill();
                }
            }

            async function _vFetchPdf(id) {
                if (!cfg.base || (!cfg.userId && !LS("accessToken"))) return;
                const doc = docList.find((d) => d.id === id);
                const filename = doc ? doc.name : `${id}.pdf`;
                const url = `${cfg.base}/chat/documents/${encodeURIComponent(id)}/pdf`;

                const overlay = document.getElementById("vDropOverlay");
                const wrap = document.getElementById("vCanvasWrap");
                overlay.innerHTML =
                    '<div class="viewer-drop-icon">⏳</div><div class="viewer-drop-text">Loading PDF…</div>';
                overlay.classList.remove("hidden");
                wrap.style.display = "none";

                try {
                    const r = await fetch(url, { headers: authHeaders() });
                    if (!r.ok) throw new Error(`HTTP ${r.status}`);
                    const ct = (r.headers.get("content-type") || "").toLowerCase();
                    const buf = await r.arrayBuffer();

                    // Validate that we actually received a PDF (helps debug cases where backend
                    // returns HTML/JSON with 200 OK).
                    const headBytes = new Uint8Array(buf.slice(0, 16));
                    const headText = Array.from(headBytes)
                        .map((b) => String.fromCharCode(b))
                        .join("");
                    const looksLikePdf = headText.startsWith("%PDF");
                    if (!looksLikePdf) {
                        let preview = "";
                        try {
                            preview = new TextDecoder("utf-8", {
                                fatal: false,
                            }).decode(new Uint8Array(buf.slice(0, 400)));
                        } catch {
                            preview = headText;
                        }
                        throw new Error(
                            `Unexpected response (content-type: ${ct || "n/a"}). ` +
                                `First bytes: ${JSON.stringify(headText)}. ` +
                                `Preview: ${preview
                                    .replace(/\s+/g, " ")
                                    .slice(0, 220)}`,
                        );
                    }
                    const file = new File([buf], filename, {
                        type: "application/pdf",
                    });
                    await vLoadFile(file);
                } catch (err) {
                    overlay.innerHTML = `
      <div class="viewer-drop-icon">📄</div>
      <div class="viewer-drop-text">Could not load PDF</div>
      <button class="viewer-drop-btn" onclick="vOpenFile()">Open manually…</button>`;
                    overlay.classList.remove("hidden");
                    document.getElementById("vCanvasWrap").style.display =
                        "none";
                    toast(`PDF load failed: ${err.message}`, "err");
                }
            }

            function vSyncToCfg() {
                const doc = docList.find((d) => d.id === vSt.linkedDocId);
                if (!doc || !vSt.total) return;
                saveCfg({
                    doc: doc.id,
                    docName: doc.name,
                    page: String(vSt.page),
                    total: String(vSt.total),
                });
                updateDocPill();
            }

            /* ══════════════════════════════════════════════════
   Helpers
══════════════════════════════════════════════════ */
            function autoResize(el) {
                el.style.height = "auto";
                el.style.height = Math.min(el.scrollHeight, 160) + "px";
            }
            function scrollBottom() {
                const el = document.getElementById("messages");
                el.scrollTop = el.scrollHeight;
            }
            function highlightActive() {
                document.querySelectorAll(".conv-item").forEach((el) => {
                    el.classList.toggle("active", el.dataset.id === activeId);
                });
            }
            function esc(s) {
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }
            function enc(s) {
                return encodeURIComponent(s);
            }
            function relTime(iso) {
                if (!iso) return "";
                try {
                    const d = new Date(iso),
                        diff = Date.now() - d;
                    if (diff < 60e3) return "just now";
                    if (diff < 3600e3) return `${Math.floor(diff / 60e3)}m ago`;
                    if (diff < 86400e3)
                        return `${Math.floor(diff / 3600e3)}h ago`;
                    return d.toLocaleDateString();
                } catch {
                    return "";
                }
            }

            let _toastTimer;
            function toast(msg, type = "") {
                const el = document.getElementById("toast");
                el.textContent = msg;
                el.className = `toast ${type} show`;
                clearTimeout(_toastTimer);
                _toastTimer = setTimeout(
                    () => el.classList.remove("show"),
                    3200,
                );
            }

            // Simple in-UI debug log of agent pipeline events
            const _debugLines = [];
            function appendDebugLog(msg) {
                if (!msg) return;
                const el = document.getElementById("debugLog");
                if (!el) return;
                const ts = new Date().toISOString().slice(11, 19); // HH:MM:SS
                _debugLines.push(`[${ts}] ${msg}`);
                while (_debugLines.length > 30) _debugLines.shift();
                el.innerHTML = _debugLines
                    .map((line) => `<div>${esc(line)}</div>`)
                    .join("");
                el.style.display = "block";
            }

            /* ══════════════════════════════════════════════════
   Citation Tooltip
══════════════════════════════════════════════════ */
            (function () {
                const tip = document.getElementById("citTooltip");
                const tipDoc = document.getElementById("citTipDoc");
                const tipPg = document.getElementById("citTipPg");
                let hideTimer;

                function show(el, x, y) {
                    const doc = el.dataset.doc || "";
                    const pg = el.dataset.pg || "";
                    if (!doc && !pg) return;

                    tipDoc.textContent = doc || "—";
                    tipPg.textContent = pg ? `page ${pg}` : "";
                    tipPg.style.display = pg ? "" : "none";

                    tip.style.visibility = "hidden";
                    tip.style.display = "flex";
                    const tw = tip.offsetWidth;
                    const th = tip.offsetHeight;
                    tip.style.visibility = "";

                    const gap = 8;
                    let left = x - tw / 2;
                    let top = y - th - gap;

                    left = Math.max(
                        8,
                        Math.min(left, window.innerWidth - tw - 8),
                    );
                    if (top < 8) top = y + gap + 16;

                    tip.style.left = left + "px";
                    tip.style.top = top + "px";
                    clearTimeout(hideTimer);
                    tip.classList.add("show");
                }

                function hide() {
                    hideTimer = setTimeout(
                        () => tip.classList.remove("show"),
                        80,
                    );
                }

                document.addEventListener("mouseover", (e) => {
                    const el = e.target.closest(".cit-ref[data-doc]");
                    if (!el) return;
                    const r = el.getBoundingClientRect();
                    show(el, r.left + r.width / 2, r.top);
                });
                document.addEventListener("mouseout", (e) => {
                    if (e.target.closest(".cit-ref[data-doc]")) hide();
                });
            })();
        </script>
    </body>
</html>
