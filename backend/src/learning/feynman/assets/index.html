<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Feynman Session — NovaLearn</title>
    <style>
      :root {
        --bg: #0a0f14;
        --bg-strong: #0e141c;
        --panel: rgba(14, 20, 28, 0.84);
        --ink: #e8eef5;
        --muted: #99a7b5;
        --line: rgba(232, 238, 245, 0.08);
        --line-strong: rgba(232, 238, 245, 0.16);
        --accent: #67d4c1;
        --accent-strong: #2fb6a1;
        --teal: #8ee8d3;
        --danger: #f28b7d;
        --warn: #f5c97e;
        --radius: 24px;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; }
      body {
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(103,212,193,0.12), transparent 22rem),
          radial-gradient(circle at bottom right, rgba(47,182,161,0.08), transparent 28rem),
          linear-gradient(180deg, var(--bg-strong) 0%, var(--bg) 100%);
        font-family: "Avenir Next","Segoe UI",sans-serif;
        display: flex; flex-direction: column; min-height: 100vh;
      }

      .shell {
        display: grid;
        grid-template-columns: 300px 1fr;
        grid-template-rows: auto 1fr;
        max-width: 1280px;
        margin: 0 auto;
        width: 100%;
        height: 100vh;
        padding: 1.5rem;
        gap: 1rem;
      }

      /* ── Top bar ── */
      .topbar {
        grid-column: 1 / -1;
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: 18px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        padding: 1rem 1.25rem;
        display: flex; align-items: center; gap: 1rem; justify-content: space-between;
      }
      .topbar-left { display: flex; flex-direction: column; gap: 0.1rem; }
      .eyebrow { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--muted); }
      .topbar h1 { font-size: 1.15rem; font-family: "Iowan Old Style","Palatino Linotype",Georgia,serif; letter-spacing: -0.02em; }
      .pill-row { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; }
      .pill { display: inline-flex; align-items: center; padding: 0.3rem 0.65rem; border-radius: 999px; background: rgba(255,255,255,0.05); font-size: 0.8rem; color: var(--muted); }
      .pill.accent { background: rgba(103,212,193,0.12); color: var(--accent); }
      .pill.warn { background: rgba(245,201,126,0.12); color: var(--warn); }

      /* ── Sidebar ── */
      .sidebar {
        background: var(--panel);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: var(--radius);
        padding: 1.25rem;
        display: flex; flex-direction: column; gap: 1.25rem;
        overflow-y: auto;
      }
      .sidebar-section h2 {
        font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.14em;
        color: var(--muted); margin-bottom: 0.65rem;
      }

      /* Theme score bars */
      .theme-list { display: flex; flex-direction: column; gap: 0.75rem; }
      .theme-item { display: flex; flex-direction: column; gap: 0.3rem; }
      .theme-header { display: flex; justify-content: space-between; align-items: baseline; }
      .theme-title { font-size: 0.88rem; line-height: 1.4; }
      .theme-score { font-size: 0.78rem; color: var(--muted); font-variant-numeric: tabular-nums; }
      .score-bar { height: 5px; border-radius: 999px; background: var(--line-strong); overflow: hidden; }
      .score-fill { height: 100%; border-radius: 999px; background: var(--line-strong); transition: width 0.5s ease, background 0.4s; }
      .score-fill[data-score="null"] { width: 0%; background: var(--line-strong); }
      .score-fill[data-score="0"] { width: 0%; background: rgba(242,139,125,0.35); }
      .score-fill[data-score="1"] { width: 20%; background: var(--warn); }
      .score-fill[data-score="2"] { width: 40%; background: var(--warn); }
      .score-fill[data-score="3"] { width: 60%; background: var(--accent); }
      .score-fill[data-score="4"] { width: 80%; background: var(--accent); }
      .score-fill[data-score="5"] { width: 100%; background: var(--teal); }

      /* Finish / abort buttons */
      .finish-btn, .abort-btn {
        border-radius: 12px;
        padding: 0.65rem 1rem;
        font: inherit;
        font-size: 0.88rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        width: 100%;
      }
      .finish-btn {
        margin-top: auto;
        border: 1px solid rgba(103,212,193,0.3);
        background: rgba(103,212,193,0.07);
        color: var(--accent);
      }
      .finish-btn:hover { background: rgba(103,212,193,0.14); border-color: rgba(103,212,193,0.5); }
      .finish-btn:disabled { opacity: 0.35; cursor: not-allowed; }
      .abort-btn {
        margin-top: 0.4rem;
        border: 1px solid rgba(242,139,125,0.3);
        background: rgba(242,139,125,0.06);
        color: var(--danger);
      }
      .abort-btn:hover { background: rgba(242,139,125,0.12); border-color: rgba(242,139,125,0.5); }
      .abort-btn:disabled { opacity: 0.35; cursor: not-allowed; }

      /* ── Chat area ── */
      .chat-area {
        background: var(--panel);
        border: 1px solid rgba(255,255,255,0.08);
        border-radius: var(--radius);
        display: flex; flex-direction: column; overflow: hidden;
      }
      .messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.1rem; }
      .msg { display: flex; flex-direction: column; gap: 0.2rem; max-width: 88%; }
      .msg.assistant { align-self: flex-start; }
      .msg.user { align-self: flex-end; }
      .msg-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.14em; color: var(--muted); }
      .msg-bubble { padding: 0.8rem 1rem; border-radius: 16px; line-height: 1.65; font-size: 0.97rem; white-space: pre-wrap; }
      .msg.assistant .msg-bubble { background: rgba(103,212,193,0.07); border: 1px solid rgba(103,212,193,0.18); border-bottom-left-radius: 4px; }
      .msg.user .msg-bubble { background: rgba(255,255,255,0.05); border: 1px solid var(--line-strong); border-bottom-right-radius: 4px; }

      .empty-msg { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 0.95rem; text-align: center; padding: 2rem; }

      /* Summary / feedback card */
      .summary-card { margin: 0 1.5rem 1rem; background: rgba(103,212,193,0.06); border: 1px solid rgba(103,212,193,0.22); border-radius: 16px; padding: 1.25rem; display: flex; flex-direction: column; gap: 0.75rem; }
      .summary-card.aborted { background: rgba(242,139,125,0.06); border-color: rgba(242,139,125,0.22); }
      .summary-card h3 { font-family: "Iowan Old Style","Palatino Linotype",Georgia,serif; font-size: 1rem; color: var(--teal); }
      .summary-card.aborted h3 { color: var(--danger); }
      .theme-result-list { display: flex; flex-direction: column; gap: 0.5rem; }
      .tr-item { display: flex; gap: 0.6rem; align-items: flex-start; font-size: 0.88rem; }
      .tr-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 0.35rem; }
      .tr-dot.high { background: var(--teal); }
      .tr-dot.mid { background: var(--accent); }
      .tr-dot.low { background: var(--warn); }
      .tr-dot.zero { background: var(--danger); }
      .tr-content { display: flex; flex-direction: column; gap: 0.15rem; flex: 1; }
      .tr-title { display: flex; align-items: baseline; gap: 0.5rem; }
      .tr-theme-name { font-weight: 600; }
      .tr-score { color: var(--muted); font-size: 0.78rem; font-variant-numeric: tabular-nums; }
      .tr-feedback { color: var(--muted); font-size: 0.84rem; line-height: 1.5; }

      /* Input bar */
      .input-bar { padding: 1rem 1.25rem 1.25rem; border-top: 1px solid var(--line); display: flex; gap: 0.7rem; align-items: flex-end; }
      textarea { flex: 1; background: rgba(8,12,18,0.86); border: 1px solid var(--line); border-radius: 14px; color: var(--ink); font: inherit; font-size: 0.97rem; padding: 0.75rem 0.9rem; resize: none; min-height: 52px; max-height: 160px; transition: border-color 0.15s; }
      textarea:focus { outline: none; border-color: rgba(103,212,193,0.36); }
      textarea:disabled { opacity: 0.5; cursor: not-allowed; }
      .send-btn { background: linear-gradient(135deg, var(--accent) 0%, var(--accent-strong) 100%); color: #031411; border: none; border-radius: 999px; padding: 0.75rem 1.25rem; font: inherit; font-weight: 700; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; white-space: nowrap; }
      .send-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
      .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

      /* Thinking dots */
      .thinking { display: flex; gap: 5px; align-items: center; padding: 0.25rem 0; }
      .thinking span { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
      .thinking span:nth-child(2) { animation-delay: 0.2s; }
      .thinking span:nth-child(3) { animation-delay: 0.4s; }
      @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

      @media (max-width: 820px) {
        .shell { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; height: auto; min-height: 100vh; }
        .sidebar { max-height: 260px; overflow-y: auto; }
        .chat-area { min-height: 60vh; }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <p class="eyebrow">Feynman Technique</p>
          <h1 id="topbarTitle">Starting session…</h1>
        </div>
        <div class="pill-row" id="topbarMeta"></div>
      </header>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-section">
          <h2>Themes</h2>
          <div class="theme-list" id="themeList">
            <p style="font-size:0.85rem;color:var(--muted)">Loading…</p>
          </div>
        </div>
        <button class="finish-btn" id="finishBtn" disabled>I'm done, nothing more to add</button>
        <button class="abort-btn" id="abortBtn" disabled>Exit session</button>
      </aside>

      <!-- Chat -->
      <div class="chat-area">
        <div class="messages" id="messages">
          <div class="empty-msg" id="emptyMsg">Connecting…</div>
        </div>
        <div id="summaryContainer"></div>
        <div class="input-bar" id="inputBar">
          <textarea id="answerInput" placeholder="Type your answer… (Enter to send, Shift+Enter for new line)" rows="2" disabled></textarea>
          <button class="send-btn" id="sendBtn" disabled>Send</button>
        </div>
      </div>
    </div>

    <script>
      // ── Config ────────────────────────────────────────────────────────────
      const API_ROOT = (() => {
        const m = window.location.pathname.match(/^(\/[^/]+\/v\d+)/);
        return m ? m[1] : "/api/v1";
      })();
      const FEYNMAN_API = API_ROOT + "/feynman";
      const AUTH_HEADER = (() => {
        const token = localStorage.getItem("nova_inspector_access_token") || "";
        return token ? { Authorization: "Bearer " + token } : {};
      })();

      // ── State ─────────────────────────────────────────────────────────────
      let sessionId = null;
      let themeTitles = [];
      let themeScores = [];
      let isCompleted = false;
      let isStarting = true;          // true while start_session SSE is in flight

      const lessonId = (new URLSearchParams(window.location.search).get("lesson_id") || "").replace(/^["']+|["']+$/g, "");

      // ── Boot ──────────────────────────────────────────────────────────────
      async function init() {
        if (!lessonId) { showFatalError("Missing lesson_id in URL. Add ?lesson_id=<uuid>"); return; }
        try { await startSession(); }
        catch (err) { showFatalError(err.message); }
      }

      // ── Start session (streaming) ─────────────────────────────────────────
      async function startSession() {
        const resp = await fetch(FEYNMAN_API + "/session", {
          method: "POST",
          headers: { "Content-Type": "application/json", ...AUTH_HEADER },
          body: JSON.stringify({ lesson_id: lessonId }),
        });
        if (!resp.ok) {
          const b = await resp.json().catch(() => ({}));
          throw new Error(b.detail || `HTTP ${resp.status}`);
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let streamingBubble = null;
        let streamingText = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.trim()) continue;
            let eventName = "", dataStr = "";
            for (const line of part.split("\n")) {
              if (line.startsWith("event: ")) eventName = line.slice(7).trim();
              if (line.startsWith("data: ")) dataStr = line.slice(6);
            }
            if (!eventName || !dataStr) continue;
            let payload;
            try { payload = JSON.parse(dataStr); } catch { continue; }

            if (eventName === "token") {
              if (!streamingBubble) {
                removeEmpty();
                streamingBubble = appendMessage("assistant", "");
              }
              streamingText += payload.content;
              streamingBubble.querySelector(".msg-bubble").textContent = streamingText;
              scrollToBottom();
            } else if (eventName === "session_started") {
              sessionId = payload.session_id;
              themeTitles = payload.theme_titles;
              themeScores = payload.theme_scores;
              isStarting = false;
              renderTopbar();
              renderThemes();
              document.getElementById("finishBtn").disabled = false;
              document.getElementById("abortBtn").disabled = false;
              enableInput();
            } else if (eventName === "error") {
              throw new Error(payload.detail || "Failed to start session");
            }
          }
        }
      }

      // ── Input events ──────────────────────────────────────────────────────
      document.getElementById("sendBtn").addEventListener("click", sendAnswer);
      document.getElementById("answerInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendAnswer(); }
      });
      document.getElementById("finishBtn").addEventListener("click", () => abortSession(true));
      document.getElementById("abortBtn").addEventListener("click", () => abortSession(false));

      async function sendAnswer() {
        const input = document.getElementById("answerInput");
        const answer = input.value.trim();
        if (!answer || isCompleted) return;
        appendMessage("user", answer);
        input.value = "";
        disableInput();
        showThinking();
        try { await streamAnswer(answer); }
        catch (err) {
          removeThinking();
          appendMessage("assistant", "⚠ " + err.message);
          enableInput();
        }
      }

      async function streamAnswer(answer) {
        const resp = await fetch(
          FEYNMAN_API + "/session/" + encodeURIComponent(sessionId) + "/answer",
          { method: "POST", headers: { "Content-Type": "application/json", ...AUTH_HEADER }, body: JSON.stringify({ answer }) }
        );
        if (!resp.ok) { const b = await resp.json().catch(() => ({})); throw new Error(b.detail || "Request failed"); }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let streamingBubble = null;
        let streamingText = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const parts = buffer.split("\n\n");
          buffer = parts.pop();

          for (const part of parts) {
            if (!part.trim()) continue;
            let eventName = "", dataStr = "";
            for (const line of part.split("\n")) {
              if (line.startsWith("event: ")) eventName = line.slice(7).trim();
              if (line.startsWith("data: ")) dataStr = line.slice(6);
            }
            if (!eventName || !dataStr) continue;
            let payload;
            try { payload = JSON.parse(dataStr); } catch { continue; }

            if (eventName === "token") {
              removeThinking();
              if (!streamingBubble) streamingBubble = appendMessage("assistant", "");
              streamingText += payload.content;
              streamingBubble.querySelector(".msg-bubble").textContent = streamingText;
              scrollToBottom();
            } else if (eventName === "message_complete") {
              streamingBubble = null; streamingText = "";
              if (payload.theme_scores) { themeScores = payload.theme_scores; renderThemes(); }
              enableInput();
            } else if (eventName === "summary") {
              removeThinking();
              isCompleted = true;
              if (payload.theme_scores) themeScores = payload.theme_scores;
              renderThemes();
              showSummary(payload, false);
              document.getElementById("inputBar").style.display = "none";
              document.getElementById("finishBtn").disabled = true;
              document.getElementById("abortBtn").disabled = true;
            } else if (eventName === "error") {
              appendMessage("assistant", "⚠ " + (payload.detail || "Unknown error"));
              enableInput();
            }
          }
        }
      }

      // ── Abort / Finish ────────────────────────────────────────────────────
      // exhausted=true  → /finish  (user said everything; null themes → 0)
      // exhausted=false → /abort   (user just leaves; null themes stay null)
      async function abortSession(exhausted) {
        if (isCompleted || isStarting || !sessionId) return;
        document.getElementById("finishBtn").disabled = true;
        document.getElementById("abortBtn").disabled = true;
        disableInput();
        try {
          const resp = await fetch(
            FEYNMAN_API + "/session/" + encodeURIComponent(sessionId) + "/abort",
            { method: "POST", headers: { "Content-Type": "application/json", ...AUTH_HEADER }, body: JSON.stringify({ exhausted }) }
          );
          if (!resp.ok) { const b = await resp.json().catch(() => ({})); throw new Error(b.detail || "Failed"); }
          const fbResp = await fetch(
            FEYNMAN_API + "/session/" + encodeURIComponent(sessionId) + "/feedback",
            { headers: { ...AUTH_HEADER } }
          );
          if (fbResp.ok) {
            const fb = await fbResp.json();
            themeScores = fb.session.covered_points || themeScores;
            renderThemes();
            showSummary({ feedback: fb.session.feedback, theme_scores: themeScores, theme_titles: themeTitles, all_covered: false }, true);
          } else {
            appendMessage("assistant", "Session ended.");
          }
        } catch (err) {
          appendMessage("assistant", "⚠ " + err.message);
        }
        isCompleted = true;
        document.getElementById("inputBar").style.display = "none";
      }

      // ── Render helpers ────────────────────────────────────────────────────
      function renderTopbar() {
        document.getElementById("topbarTitle").textContent = "Feynman Session";
        document.getElementById("topbarMeta").innerHTML =
          `<span class="pill accent">${themeTitles.length} theme${themeTitles.length !== 1 ? "s" : ""}</span>` +
          `<span class="pill warn">Unlimited iterations</span>`;
      }

      function renderThemes() {
        const list = document.getElementById("themeList");
        list.innerHTML = themeTitles.map((title, i) => {
          const score = themeScores[i] ?? null;
          const scoreLabel = score === null ? "—" : `${score}/5`;
          const dataScore = score === null ? "null" : String(score);
          return `
            <div class="theme-item">
              <div class="theme-header">
                <span class="theme-title">${escapeHtml(title)}</span>
                <span class="theme-score">${scoreLabel}</span>
              </div>
              <div class="score-bar"><div class="score-fill" data-score="${dataScore}"></div></div>
            </div>`;
        }).join("");
      }

      function showSummary(payload, aborted) {
        const container = document.getElementById("summaryContainer");
        const scores = payload.theme_scores || themeScores;
        const titles = payload.theme_titles || themeTitles;
        // feedback is list[{theme, feedback}] or null
        const feedbackList = Array.isArray(payload.feedback) ? payload.feedback : [];
        const feedbackMap = {};
        feedbackList.forEach(item => { feedbackMap[item.theme] = item.feedback; });

        const themesHtml = titles.map((title, i) => {
          const s = scores[i] ?? null;
          const isNull = s === null;
          const dotClass = isNull ? "zero" : s >= 4 ? "high" : s >= 2 ? "mid" : s >= 1 ? "low" : "zero";
          const scoreLabel = isNull ? "—" : `${s}/5`;
          const fb = feedbackMap[title] || null;
          return `<div class="tr-item">
            <span class="tr-dot ${dotClass}" style="${isNull ? "opacity:0.3" : ""}"></span>
            <div class="tr-content">
              <div class="tr-title">
                <span class="tr-theme-name" style="${isNull ? "opacity:0.45" : ""}">${escapeHtml(title)}</span>
                <span class="tr-score">${scoreLabel}</span>
              </div>
              ${fb ? `<span class="tr-feedback">${escapeHtml(fb)}</span>` : ""}
            </div>
          </div>`;
        }).join("");

        container.innerHTML = `
          <div class="summary-card${aborted ? " aborted" : ""}">
            <h3>${aborted ? "Session ended early" : "🎉 All themes covered!"}</h3>
            <div class="theme-result-list">${themesHtml}</div>
          </div>`;
        scrollToBottom();
      }

      // ── DOM utils ─────────────────────────────────────────────────────────
      function removeEmpty() {
        const el = document.getElementById("emptyMsg");
        if (el) el.remove();
      }

      function appendMessage(role, content) {
        removeEmpty();
        const msgs = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg " + role;
        div.innerHTML = `<span class="msg-label">${role === "assistant" ? "Nova" : "You"}</span><div class="msg-bubble">${escapeHtml(content)}</div>`;
        msgs.appendChild(div);
        scrollToBottom();
        return div;
      }

      function showThinking() {
        const msgs = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "msg assistant"; div.id = "thinkingBubble";
        div.innerHTML = `<span class="msg-label">Nova</span><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
        msgs.appendChild(div); scrollToBottom();
      }

      function removeThinking() { const el = document.getElementById("thinkingBubble"); if (el) el.remove(); }

      function showFatalError(msg) {
        const el = document.getElementById("emptyMsg");
        if (el) { el.textContent = "Error: " + msg; el.style.color = "var(--danger)"; }
        else { appendMessage("assistant", "⚠ " + msg); }
      }

      function enableInput() {
        document.getElementById("answerInput").disabled = false;
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("answerInput").focus();
      }
      function disableInput() {
        document.getElementById("answerInput").disabled = true;
        document.getElementById("sendBtn").disabled = true;
      }
      function scrollToBottom() { const m = document.getElementById("messages"); m.scrollTop = m.scrollHeight; }
      function escapeHtml(v) {
        return String(v).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
      }

      init();
    </script>
  </body>
</html>
