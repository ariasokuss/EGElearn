<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roadmap Checker</title>
<style>
  :root {
    --bg: #f5f5f5;
    --card: #fff;
    --border: #e8e8e8;
    --text: #1a1a1a;
    --muted: #888;
    --accent: #4a7c59;
    --accent-light: #e8f5e9;
    --progress-bg: #e0e0e0;
    --progress-fill: #4a7c59;
    --gold: #d4a017;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 20px;
    max-width: 820px;
    margin: 0 auto;
  }

  /* --- Header bar --- */
  .toolbar {
    display: flex; gap: 8px; align-items: center;
    margin-bottom: 24px; flex-wrap: wrap;
  }
  .toolbar input, .toolbar select {
    padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 14px; background: var(--card);
  }
  .toolbar input { flex: 1; min-width: 200px; }
  .toolbar button {
    padding: 8px 18px; border: none; border-radius: 8px;
    background: var(--accent); color: #fff; font-size: 14px;
    cursor: pointer; font-weight: 500;
  }
  .toolbar button:hover { opacity: .85; }
  .toolbar button.secondary {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
  }

  /* --- Stats bar --- */
  .stats {
    display: flex; gap: 16px; margin-bottom: 20px;
    background: var(--card); padding: 14px 18px; border-radius: 12px;
    border: 1px solid var(--border); font-size: 14px; flex-wrap: wrap;
  }
  .stats span { color: var(--muted); }
  .stats b { color: var(--text); }

  /* --- Section card --- */
  .section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 16px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .section.all-done { border-color: var(--accent); background: #fcfff9; }

  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 18px; cursor: pointer; user-select: none;
  }
  .section-header:hover { background: #fafafa; }
  .section-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--progress-bg); flex-shrink: 0;
  }
  .section-dot.done { background: var(--accent); }
  .section-dot.partial { background: var(--gold); }
  .section-header h2 {
    font-size: 15px; font-weight: 600; flex: 1;
  }
  .section-progress {
    font-size: 13px; color: var(--muted); white-space: nowrap;
  }

  .section-body { display: none; padding: 0 18px 14px; }
  .section.open .section-body { display: block; }

  /* --- Subsection --- */
  .subsection {
    margin-top: 10px;
    border-left: 3px solid var(--border);
    padding-left: 14px;
  }
  .subsection-name {
    font-size: 13px; font-weight: 600; color: var(--muted);
    margin-bottom: 6px; text-transform: uppercase; letter-spacing: .3px;
  }

  /* --- Lesson row --- */
  .lesson {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 0; border-bottom: 1px solid #f0f0f0;
  }
  .lesson:last-child { border-bottom: none; }

  .lesson-name {
    flex: 1; font-size: 14px; overflow: hidden;
    text-overflow: ellipsis; white-space: nowrap;
  }

  .lesson-pct {
    font-size: 13px; font-weight: 600; min-width: 40px;
    text-align: right; color: var(--muted);
  }
  .lesson-pct.done { color: var(--accent); }

  /* --- Circular progress --- */
  .ring {
    width: 24px; height: 24px; flex-shrink: 0; position: relative;
  }
  .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
  .ring .track { fill: none; stroke: var(--progress-bg); stroke-width: 3; }
  .ring .fill  { fill: none; stroke: var(--accent); stroke-width: 3;
    stroke-linecap: round; transition: stroke-dashoffset .4s; }
  .ring .check {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    font-size: 12px; color: var(--accent);
  }

  /* --- Controls on lesson --- */
  .lesson input[type=range] {
    width: 80px; accent-color: var(--accent);
  }

  /* --- Log --- */
  .log {
    margin-top: 24px; background: #1e1e1e; color: #ccc;
    border-radius: 10px; padding: 14px; font-size: 12px;
    font-family: 'SF Mono', Menlo, monospace;
    max-height: 200px; overflow-y: auto;
  }
  .log .ok  { color: #6ec86e; }
  .log .err { color: #e76e6e; }
  .log .dim { color: #666; }

  .empty {
    text-align: center; padding: 60px 20px; color: var(--muted);
    font-size: 15px;
  }
</style>
</head>
<body>

<h1 style="font-size:22px; margin-bottom:16px;">Roadmap Checker</h1>

<div class="toolbar">
  <input id="base" type="text" placeholder="Base URL, e.g. http://localhost:8080/api/v1">
  <input id="token" type="text" placeholder="Bearer token or x-user-id">
  <input id="folderId" type="text" placeholder="Folder ID (auto-detected)">
  <button onclick="loadRoadmap()">Load</button>
  <button class="secondary" onclick="detectFolder()">Auto-detect folder</button>
</div>

<div class="stats" id="stats" style="display:none"></div>
<div id="roadmap"></div>
<div class="log" id="log"></div>

<script>
const $ = id => document.getElementById(id);
const C = 2 * Math.PI * 9; // circumference for r=9

function ring(pct) {
  const offset = C - (pct / 100) * C;
  const done = pct === 100;
  return `<div class="ring">
    <svg viewBox="0 0 24 24">
      <circle class="track" cx="12" cy="12" r="9"/>
      <circle class="fill" cx="12" cy="12" r="9"
        stroke-dasharray="${C}" stroke-dashoffset="${offset}"/>
    </svg>
    ${done ? '<div class="check">&#10003;</div>' : ''}
  </div>`;
}

function log(msg, cls = '') {
  const el = $('log');
  const ts = new Date().toLocaleTimeString();
  el.innerHTML += `<div><span class="dim">${ts}</span> <span class="${cls}">${msg}</span></div>`;
  el.scrollTop = el.scrollHeight;
}

function headers() {
  const h = { 'Content-Type': 'application/json' };
  const tok = $('token').value.trim();
  if (!tok) return h;
  if (tok.length > 40) h['Authorization'] = `Bearer ${tok}`;
  else h['x-user-id'] = tok;
  return h;
}

function base() {
  return $('base').value.trim().replace(/\/+$/, '') || 'http://localhost:8080/api/v1';
}

async function api(method, path, body) {
  const url = base() + path;
  const opts = { method, headers: headers() };
  if (body) opts.body = JSON.stringify(body);
  log(`${method} ${path}`, 'dim');
  const r = await fetch(url, opts);
  const data = await r.json();
  if (!r.ok) {
    log(`${r.status} ${JSON.stringify(data)}`, 'err');
    throw new Error(data.detail || r.statusText);
  }
  log(`${r.status} OK`, 'ok');
  return data;
}

async function detectFolder() {
  try {
    const folders = await api('GET', '/files/folders');
    const shared = folders.find(f => f.type === 'a_level' && !f.user_id);
    if (shared) {
      $('folderId').value = shared.id;
      log(`Found shared folder: ${shared.name} (${shared.id})`, 'ok');
    } else if (folders.length) {
      $('folderId').value = folders[0].id;
      log(`No shared folder found, using first: ${folders[0].name}`, 'dim');
    } else {
      log('No folders found', 'err');
    }
  } catch(e) { log(e.message, 'err'); }
}

let roadmapData = null;

async function loadRoadmap() {
  const fid = $('folderId').value.trim();
  if (!fid) { log('Enter a folder ID or click Auto-detect', 'err'); return; }
  try {
    roadmapData = await api('GET', `/roadmap/folders/${fid}`);
    render(roadmapData);
  } catch(e) { log(e.message, 'err'); }
}

function sectionProgress(section) {
  let total = 0, sum = 0;
  section.lessons.forEach(l => { total++; sum += l.progress; });
  section.subsections.forEach(s => s.lessons.forEach(l => { total++; sum += l.progress; }));
  return total ? Math.round(sum / total) : 0;
}

function render(data) {
  // Stats
  const s = $('stats');
  s.style.display = 'flex';
  s.innerHTML = `
    <div><span>Total lessons:</span> <b>${data.total_lessons}</b></div>
    <div><span>Completed:</span> <b>${data.completed_lessons}</b></div>
    <div><span>Overall:</span> <b>${data.overall_progress}%</b></div>
  `;

  // Sections
  const el = $('roadmap');
  if (!data.sections.length) { el.innerHTML = '<div class="empty">No roadmap data</div>'; return; }

  el.innerHTML = data.sections.map((sec, i) => {
    const pct = sectionProgress(sec);
    const allDone = pct === 100;
    const dotCls = allDone ? 'done' : pct > 0 ? 'partial' : '';

    const directLessons = sec.lessons.map(l => lessonRow(l)).join('');
    const subsections = sec.subsections.map(sub => `
      <div class="subsection">
        <div class="subsection-name">${sub.name}</div>
        ${sub.lessons.map(l => lessonRow(l)).join('')}
      </div>
    `).join('');

    return `
      <div class="section ${allDone ? 'all-done' : ''}" id="sec-${i}">
        <div class="section-header" onclick="toggle(${i})">
          <div class="section-dot ${dotCls}"></div>
          <h2>${sec.name}</h2>
          <div class="section-progress">${pct}%</div>
          ${ring(pct)}
        </div>
        <div class="section-body">
          ${directLessons}
          ${subsections}
        </div>
      </div>
    `;
  }).join('');
}

function lessonRow(l) {
  const done = l.progress === 100;
  return `
    <div class="lesson">
      <div class="lesson-name">${l.name}</div>
      <input type="range" min="0" max="100" step="5" value="${l.progress}"
        onchange="setProgress('${l.id}', +this.value, this)">
      <div class="lesson-pct ${done ? 'done' : ''}">${l.progress}%</div>
      ${ring(l.progress)}
    </div>
  `;
}

function toggle(i) {
  document.getElementById('sec-' + i).classList.toggle('open');
}

async function setProgress(nodeId, value, input) {
  try {
    const res = await api('PATCH', `/roadmap/nodes/${nodeId}/progress`, { progress: value });
    // Reload to refresh stats
    await loadRoadmap();
  } catch(e) {
    log(e.message, 'err');
    input.value = input.defaultValue; // revert on error
  }
}

// Auto-fill base URL
$('base').value = 'http://localhost:8080/api/v1';
</script>
</body>
</html>
